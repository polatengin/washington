name: Deploy Website

"on":
  push:
    branches:
      - main
    paths:
      - docs/**
      - tests/fixtures/**
      - src/cli/**
      - src/website/**
      - CONTRIBUTING.md
      - .github/workflows/deploy-website.yml
  workflow_dispatch:

concurrency:
  group: website-production
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LOCATION: westus2
      SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
      RESOURCE_GROUP: ${{ secrets.AZURE_CONTAINER_APP_RESOURCE_GROUP }}
      VNET_NAME: ${{ secrets.PROJECT_NAME }}-aca-vnet
      VNET_CIDR: "10.50.0.0/16"
      SUBNET_NAME: ${{ secrets.PROJECT_NAME }}-aca-subnet
      SUBNET_CIDR: "10.50.0.0/23"
      LOG_ANALYTICS_WORKSPACE: "law-${{ secrets.PROJECT_NAME }}-web-westus2"
      ACA_ENV: "${{ secrets.PROJECT_NAME }}-web-env"
      ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
      ACA_APP: "${{ secrets.PROJECT_NAME }}-website"
      IMAGE_TAG: latest
      WEBSITE_HOSTNAME: bicepcostestimator.net

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Enable Azure CLI extension auto-install
        run: az config set extension.use_dynamic_install=yes_without_prompt

      - name: Resolve image tags
        id: image
        run: |
          set -euo pipefail

          az account set --subscription "${SUBSCRIPTION_ID}"

          az group create \
            --name "${RESOURCE_GROUP}" \
            --location "${LOCATION}"

          ENV_ID="$(az containerapp env show \
            --name "${ACA_ENV}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query id \
            --output tsv 2>/dev/null || true)"

          if [[ -z "${ENV_ID}" ]]; then
            echo "Container Apps environment ${ACA_ENV} not found; bootstrapping network and environment"

            if ! az network vnet show \
              --resource-group "${RESOURCE_GROUP}" \
              --name "${VNET_NAME}" >/dev/null 2>&1; then
              az network vnet create \
                --resource-group "${RESOURCE_GROUP}" \
                --name "${VNET_NAME}" \
                --location "${LOCATION}" \
                --address-prefix "${VNET_CIDR}"
            else
              echo "VNet ${VNET_NAME} already exists; skipping create"
            fi

            if ! az network vnet subnet show \
              --resource-group "${RESOURCE_GROUP}" \
              --vnet-name "${VNET_NAME}" \
              --name "${SUBNET_NAME}" >/dev/null 2>&1; then
              az network vnet subnet create \
                --resource-group "${RESOURCE_GROUP}" \
                --vnet-name "${VNET_NAME}" \
                --name "${SUBNET_NAME}" \
                --address-prefixes "${SUBNET_CIDR}"
            else
              echo "Subnet ${SUBNET_NAME} already exists; skipping create"
            fi

            subnet_delegated="$(az network vnet subnet show \
              --resource-group "${RESOURCE_GROUP}" \
              --vnet-name "${VNET_NAME}" \
              --name "${SUBNET_NAME}" \
              --query "length(delegations[?serviceName=='Microsoft.App/environments'])" \
              --output tsv)"

            if [[ "${subnet_delegated}" == "0" ]]; then
              az network vnet subnet update \
                --resource-group "${RESOURCE_GROUP}" \
                --vnet-name "${VNET_NAME}" \
                --name "${SUBNET_NAME}" \
                --delegations Microsoft.App/environments
            else
              echo "Subnet ${SUBNET_NAME} already delegated to Microsoft.App/environments; skipping update"
            fi

            INFRA_SUBNET_ID="$(az network vnet subnet show \
              --resource-group "${RESOURCE_GROUP}" \
              --vnet-name "${VNET_NAME}" \
              --name "${SUBNET_NAME}" \
              --query id \
              --output tsv)"

            if ! az monitor log-analytics workspace show \
              --resource-group "${RESOURCE_GROUP}" \
              --workspace-name "${LOG_ANALYTICS_WORKSPACE}" >/dev/null 2>&1; then
              az monitor log-analytics workspace create \
                --resource-group "${RESOURCE_GROUP}" \
                --workspace-name "${LOG_ANALYTICS_WORKSPACE}" \
                --location "${LOCATION}" \
                --sku PerGB2018
            else
              echo "Log Analytics workspace ${LOG_ANALYTICS_WORKSPACE} already exists; skipping create"
            fi

            LOG_ANALYTICS_WORKSPACE_ID="$(az monitor log-analytics workspace show \
              --resource-group "${RESOURCE_GROUP}" \
              --workspace-name "${LOG_ANALYTICS_WORKSPACE}" \
              --query customerId \
              --output tsv)"

            LOG_ANALYTICS_WORKSPACE_KEY="$(az monitor log-analytics workspace get-shared-keys \
              --resource-group "${RESOURCE_GROUP}" \
              --workspace-name "${LOG_ANALYTICS_WORKSPACE}" \
              --query primarySharedKey \
              --output tsv)"

            az containerapp env create \
              --name "${ACA_ENV}" \
              --resource-group "${RESOURCE_GROUP}" \
              --location "${LOCATION}" \
              --infrastructure-subnet-resource-id "${INFRA_SUBNET_ID}" \
              --logs-destination log-analytics \
              --logs-workspace-id "${LOG_ANALYTICS_WORKSPACE_ID}" \
              --logs-workspace-key "${LOG_ANALYTICS_WORKSPACE_KEY}"

            ENV_ID="$(az containerapp env show \
              --name "${ACA_ENV}" \
              --resource-group "${RESOURCE_GROUP}" \
              --query id \
              --output tsv)"
          else
            echo "Container Apps environment ${ACA_ENV} already exists; skipping network and environment bootstrap"
          fi

          az acr update \
            --name "${ACR_NAME}" \
            --admin-enabled true

          ACR_LOGIN_SERVER="$(az acr show \
            --name "${ACR_NAME}" \
            --query loginServer \
            --output tsv)"

          ACR_USERNAME="$(az acr credential show \
            --name "${ACR_NAME}" \
            --query username \
            --output tsv)"

          ACR_PASSWORD="$(az acr credential show \
            --name "${ACR_NAME}" \
            --query passwords[0].value \
            --output tsv)"

          IMAGE="${ACR_LOGIN_SERVER}/${ACA_APP}:${IMAGE_TAG}"

          if ! az containerapp show \
            --name "${ACA_APP}" \
            --resource-group "${RESOURCE_GROUP}" >/dev/null 2>&1; then
            echo "Container App ${ACA_APP} not found; creating it"

            cat > containerapp.yaml <<EOF
          location: ${LOCATION}
          name: ${ACA_APP}
          type: Microsoft.App/containerApps
          properties:
            environmentId: ${ENV_ID}
            configuration:
              activeRevisionsMode: Single
              ingress:
                external: true
                targetPort: 3000
                transport: http
                allowInsecure: true
                additionalPortMappings:
                  - exposedPort: 22
                    external: true
                    targetPort: 2222
                traffic:
                  - latestRevision: true
                    weight: 100
              registries:
                - server: ${ACR_LOGIN_SERVER}
                  username: ${ACR_USERNAME}
                  passwordSecretRef: acr-password
              secrets:
                - name: acr-password
                  value: |-
                    ${ACR_PASSWORD}
            template:
              containers:
                - name: website
                  image: ${IMAGE}
                  env:
                    - name: SSH_PORT
                      value: "2222"
                  resources:
                    cpu: 0.5
                    memory: 1.0Gi
              scale:
                minReplicas: 1
                maxReplicas: 1
          EOF

            az containerapp create \
              --name "${ACA_APP}" \
              --resource-group "${RESOURCE_GROUP}" \
              --yaml containerapp.yaml
          else
            echo "Container App ${ACA_APP} already exists; skipping create"
          fi

          image_sha="${ACR_LOGIN_SERVER}/${ACA_APP}:${GITHUB_SHA}"
          image_latest="${ACR_LOGIN_SERVER}/${ACA_APP}:latest"

          echo "ACR_LOGIN_SERVER=${ACR_LOGIN_SERVER}" >> "$GITHUB_ENV"
          echo "IMAGE_SHA=${image_sha}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=${image_latest}" >> "$GITHUB_ENV"
          echo "image_sha=${image_sha}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${image_latest}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Azure Container Registry
        run: |
          set -euo pipefail

          az account set --subscription "${SUBSCRIPTION_ID}"
          az acr login --name "${ACR_NAME}"

      - name: Build and push website image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/website/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_sha }}
            ${{ steps.image.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy image to Azure Container App
        run: |
          set -euo pipefail

          az account set --subscription "${SUBSCRIPTION_ID}"

          az containerapp update \
            --name "${ACA_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --image "${IMAGE_SHA}"

      - name: Ensure ingress and hostname binding
        run: |
          set -euo pipefail

          az account set --subscription "${SUBSCRIPTION_ID}"

          az containerapp ingress update \
            --name "${ACA_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --type external \
            --target-port 3000 \
            --transport "http" \
            --allow-insecure true

          existing_binding_name="$(az containerapp hostname list \
            --name "${ACA_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query "[?name=='${WEBSITE_HOSTNAME}' && bindingType=='SniEnabled' && certificateId!=null] | [0].name" \
            --output tsv)"

          if [[ "${existing_binding_name}" == "${WEBSITE_HOSTNAME}" ]]; then
            echo "Hostname ${WEBSITE_HOSTNAME} is already bound with a certificate; skipping bind"
          else
            az containerapp hostname bind \
              --name "${ACA_APP}" \
              --resource-group "${RESOURCE_GROUP}" \
              --hostname "${WEBSITE_HOSTNAME}" \
              --environment "${ACA_ENV}" \
              --validation-method "http"
          fi

      - name: Show deployed revision
        run: |
          set -euo pipefail

          az account set --subscription "${SUBSCRIPTION_ID}"

          fqdn="$(az containerapp show \
            --name "${ACA_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"

          revision="$(az containerapp show \
          --name "${ACA_APP}" \
          --resource-group "${RESOURCE_GROUP}" \
            --query properties.latestReadyRevisionName \
            --output tsv)"

          echo "Deployed revision: $revision"
          echo "Website URL: https://$fqdn"

      - name: Purge old website images from Azure Container Registry
        run: |
          set -euo pipefail

          az account set --subscription "${SUBSCRIPTION_ID}"

          mapfile -t old_tags < <(
            az acr repository show-tags \
              --name "${ACR_NAME}" \
              --repository "${ACA_APP}" \
              --orderby time_desc \
              --output tsv | \
              awk -v keep="10" '/^[0-9a-f]{40}$/ { count++; if (count > keep) print }'
          )

          for tag in "${old_tags[@]}"; do
            echo "Deleting ${ACA_APP}:$tag"
            az acr repository delete \
              --name "${ACR_NAME}" \
              --image "${ACA_APP}:$tag" \
              --yes
          done
