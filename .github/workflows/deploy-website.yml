name: Deploy Website

"on":
  push:
    branches:
      - main
    paths:
      - docs/**
      - tests/fixtures/**
      - src/cli/**
      - src/website/**
      - CONTRIBUTING.md
      - .github/workflows/deploy-website.yml
  workflow_dispatch:

concurrency:
  group: website-production
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: 'bash --noprofile --norc -euo pipefail {0}'
    env:
      RESOURCE_GROUP: ${{ secrets.PROJECT_NAME }}-prod-rg
      ACA_APP: "${{ secrets.PROJECT_NAME }}-website"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push website image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: src/website/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure stable SSH host key
        run: |
          if ! az containerapp secret show \
            --name "${ACA_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --secret-name ssh-host-key >/dev/null 2>&1; then
            temp_dir="$(mktemp -d)"
            trap 'rm -rf "${temp_dir}"' EXIT

            ssh-keygen -t rsa -b 2048 -m PEM -N "" -f "${temp_dir}/ssh_host_rsa_key" >/dev/null
            host_key_base64="$(base64 < "${temp_dir}/ssh_host_rsa_key" | tr -d '\n')"

            az containerapp secret set \
              --name "${ACA_APP}" \
              --resource-group "${RESOURCE_GROUP}" \
              --secrets "ssh-host-key=${host_key_base64}" >/dev/null
          fi

      - name: Deploy image to Azure Container App
        run: |
          az containerapp update \
            --name "${ACA_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --image "ghcr.io/${{ github.repository }}:${{ github.sha }}" \
            --secret-volume-mount "/mnt/secrets" \
            --set-env-vars SSH_PORT=2222 SSH_HOST_KEY_PATH=/mnt/secrets/ssh-host-key
