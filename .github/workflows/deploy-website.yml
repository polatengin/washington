name: Deploy Website

"on":
  push:
    branches:
      - main
    paths:
      - docs/**
      - tests/fixtures/**
      - src/cli/**
      - src/website/**
      - CONTRIBUTING.md
      - .github/workflows/deploy-website.yml
  workflow_dispatch:

concurrency:
  group: website-production
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: 'bash --noprofile --norc -euo pipefail {0}'
    env:
      RESOURCE_GROUP: ${{ secrets.PROJECT_NAME }}-prod-rg
      ACA_APP: "${{ secrets.PROJECT_NAME }}-website"
      ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "${ACR_NAME}"

      - name: Resolve image tags
        id: image
        run: |
          acr_login_server="$(az acr show \
            --name "${ACR_NAME}" \
            --query loginServer \
            --output tsv)"

          echo "image_sha=${acr_login_server}/${ACA_APP}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${acr_login_server}/${ACA_APP}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push website image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/website/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_sha }}
            ${{ steps.image.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure stable SSH host key
        run: |
          if ! az containerapp secret show \
            --name "${ACA_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --secret-name ssh-host-key >/dev/null 2>&1; then
            temp_dir="$(mktemp -d)"
            trap 'rm -rf "${temp_dir}"' EXIT

            ssh-keygen -t rsa -b 2048 -m PEM -N "" -f "${temp_dir}/ssh_host_rsa_key" >/dev/null
            host_key_base64="$(base64 < "${temp_dir}/ssh_host_rsa_key" | tr -d '\n')"

            az containerapp secret set \
              --name "${ACA_APP}" \
              --resource-group "${RESOURCE_GROUP}" \
              --secrets "ssh-host-key=${host_key_base64}" >/dev/null
          fi

      - name: Deploy image to Azure Container App
        run: |
          az containerapp update \
            --name "${ACA_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --image "${{ steps.image.outputs.image_sha }}" \
            --secret-volume-mount "/mnt/secrets" \
            --set-env-vars SSH_PORT=2222 SSH_HOST_KEY_PATH=/mnt/secrets/ssh-host-key

      - name: Purge old website images from Azure Container Registry
        run: |
          mapfile -t old_tags < <(
            az acr repository show-tags \
              --name "${ACR_NAME}" \
              --repository "${ACA_APP}" \
              --orderby time_desc \
              --output tsv | \
              awk -v keep="10" '/^[0-9a-f]{40}$/ { count++; if (count > keep) print }'
          )

          for tag in "${old_tags[@]}"; do
            echo "Deleting ${ACA_APP}:$tag"
            az acr repository delete \
              --name "${ACR_NAME}" \
              --image "${ACA_APP}:$tag" \
              --yes
          done
