name: Deploy Website

"on":
  push:
    branches:
      - main
    paths:
      - docs/**
      - tests/fixtures/**
      - src/cli/**
      - src/website/**
      - CONTRIBUTING.md
      - .github/workflows/deploy-website.yml
  workflow_dispatch:

concurrency:
  group: website-production
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP: ${{ secrets.PROJECT_NAME }}-prod-rg
      ACA_APP: "${{ secrets.PROJECT_NAME }}-website"
      ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Enable Azure CLI extension auto-install
        run: az config set extension.use_dynamic_install=yes_without_prompt

      - name: Resolve image tags
        id: image
        run: |
          set -euo pipefail

          az account set --subscription "${SUBSCRIPTION_ID}"

          ACR_LOGIN_SERVER="$(az acr show \
            --name "${ACR_NAME}" \
            --query loginServer \
            --output tsv)"

          image_sha="${ACR_LOGIN_SERVER}/${ACA_APP}:${GITHUB_SHA}"
          image_latest="${ACR_LOGIN_SERVER}/${ACA_APP}:latest"

          echo "ACR_LOGIN_SERVER=${ACR_LOGIN_SERVER}" >> "$GITHUB_ENV"
          echo "IMAGE_SHA=${image_sha}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=${image_latest}" >> "$GITHUB_ENV"
          echo "image_sha=${image_sha}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${image_latest}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Azure Container Registry
        run: |
          set -euo pipefail

          az account set --subscription "${SUBSCRIPTION_ID}"
          az acr login --name "${ACR_NAME}"

      - name: Build and push website image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/website/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_sha }}
            ${{ steps.image.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy image to Azure Container App
        run: |
          set -euo pipefail

          az account set --subscription "${SUBSCRIPTION_ID}"

          az containerapp update \
            --name "${ACA_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --image "${IMAGE_SHA}"

      - name: Show deployed revision
        run: |
          set -euo pipefail

          az account set --subscription "${SUBSCRIPTION_ID}"

          fqdn="$(az containerapp show \
            --name "${ACA_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"

          revision="$(az containerapp show \
          --name "${ACA_APP}" \
          --resource-group "${RESOURCE_GROUP}" \
            --query properties.latestReadyRevisionName \
            --output tsv)"

          echo "Deployed revision: $revision"
          echo "Website URL: https://$fqdn"

      - name: Purge old website images from Azure Container Registry
        run: |
          set -euo pipefail

          az account set --subscription "${SUBSCRIPTION_ID}"

          mapfile -t old_tags < <(
            az acr repository show-tags \
              --name "${ACR_NAME}" \
              --repository "${ACA_APP}" \
              --orderby time_desc \
              --output tsv | \
              awk -v keep="10" '/^[0-9a-f]{40}$/ { count++; if (count > keep) print }'
          )

          for tag in "${old_tags[@]}"; do
            echo "Deleting ${ACA_APP}:$tag"
            az acr repository delete \
              --name "${ACR_NAME}" \
              --image "${ACA_APP}:$tag" \
              --yes
          done
