name: Deploy Website

"on":
  push:
    branches:
      - main
    paths:
      - docs/**
      - tests/fixtures/**
      - src/cli/**
      - src/website/**
      - CONTRIBUTING.md
      - .github/workflows/deploy-website.yml
  workflow_dispatch:

concurrency:
  group: website-production
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
      AZURE_CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
      AZURE_RESOURCE_GROUP_NAME: ${{ secrets.AZURE_CONTAINER_APP_RESOURCE_GROUP }}
      LOCATION: westus2
      WEBSITE_IMAGE_REPOSITORY: washington-website
      WEBSITE_IMAGE_TAG_RETENTION_COUNT: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Enable Azure CLI extension auto-install
        run: az config set extension.use_dynamic_install=yes_without_prompt

      - name: Resolve image tags
        id: image
        run: |
          set -euo pipefail

          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

          acr_login_server="$(az acr show --name "$AZURE_ACR_NAME" --query loginServer --output tsv)"
          image_sha="$acr_login_server/$WEBSITE_IMAGE_REPOSITORY:$GITHUB_SHA"
          image_latest="$acr_login_server/$WEBSITE_IMAGE_REPOSITORY:latest"

          echo "ACR_LOGIN_SERVER=$acr_login_server" >> "$GITHUB_ENV"
          echo "IMAGE_SHA=$image_sha" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=$image_latest" >> "$GITHUB_ENV"
          echo "image_sha=$image_sha" >> "$GITHUB_OUTPUT"
          echo "image_latest=$image_latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Azure Container Registry
        run: |
          set -euo pipefail

          az account set --subscription "$AZURE_SUBSCRIPTION_ID"
          az acr login --name "$AZURE_ACR_NAME"

      - name: Build and push website image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/website/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_sha }}
            ${{ steps.image.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy image to Azure Container App
        run: |
          set -euo pipefail

          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

          az containerapp update \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP_NAME" \
            --image "$IMAGE_SHA"

      - name: Show deployed revision
        run: |
          set -euo pipefail

          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

          fqdn="$(az containerapp show \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP_NAME" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"

          revision="$(az containerapp show \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP_NAME" \
            --query properties.latestReadyRevisionName \
            --output tsv)"

          echo "Deployed revision: $revision"
          echo "Website URL: https://$fqdn"

      - name: Purge old website images from Azure Container Registry
        run: |
          set -euo pipefail

          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

          mapfile -t old_tags < <(
            az acr repository show-tags \
              --name "$AZURE_ACR_NAME" \
              --repository "$WEBSITE_IMAGE_REPOSITORY" \
              --orderby time_desc \
              --output tsv | \
              awk -v keep="$WEBSITE_IMAGE_TAG_RETENTION_COUNT" '/^[0-9a-f]{40}$/ { count++; if (count > keep) print }'
          )

          for tag in "${old_tags[@]}"; do
            echo "Deleting $WEBSITE_IMAGE_REPOSITORY:$tag"
            az acr repository delete \
              --name "$AZURE_ACR_NAME" \
              --image "$WEBSITE_IMAGE_REPOSITORY:$tag" \
              --yes
          done
