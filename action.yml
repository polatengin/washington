name: 'Azure Cost Estimator'
description: 'Estimate monthly Azure costs from Bicep files'
inputs:
  file:
    description: 'Path to the .bicep file'
    required: true
  params-file:
    description: 'Path to the .bicepparam file'
    required: false
  base-file:
    description: 'Path to the base branch .bicep file (enables delta comparison)'
    required: false
  base-params-file:
    description: 'Path to the base branch .bicepparam file'
    required: false
  currency:
    description: 'Currency code (default: USD)'
    required: false
    default: 'USD'
  output-format:
    description: 'Output format: json, table, or markdown'
    required: false
    default: 'json'
  fail-on-threshold:
    description: 'Fail the step if estimated monthly cost exceeds this value'
    required: false
outputs:
  estimation-result:
    description: 'JSON cost estimation result'
    value: ${{ steps.cost-estimator.outputs.estimation-result }}
  total-cost:
    description: 'Estimated monthly total (numeric)'
    value: ${{ steps.cost-estimator.outputs.total-cost }}
  base-cost:
    description: 'Base branch estimated monthly total (numeric, 0 if no base-file)'
    value: ${{ steps.base-cost-estimator.outputs.base-cost }}
  delta-cost:
    description: 'Monthly cost delta (current - base, numeric)'
    value: ${{ steps.delta.outputs.delta-cost }}
runs:
  using: 'composite'
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build CLI
      shell: bash
      run: |
        dotnet build "${{ github.action_path }}/src/cli/cli.csproj" -c Release -o "${{ runner.temp }}/washington"

    - name: Run Cost Estimation
      id: cost-estimator
      shell: bash
      run: |
        ARGS="estimate --file ${{ inputs.file }}"
        if [ -n "${{ inputs.params-file }}" ]; then
          ARGS="$ARGS --params-file ${{ inputs.params-file }}"
        fi
        ARGS="$ARGS --output ${{ inputs.output-format }} --currency ${{ inputs.currency }}"

        RESULT=$("${{ runner.temp }}/washington/cli" $ARGS)

        echo "estimation-result<<EOF" >> $GITHUB_OUTPUT
        echo "$RESULT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        TOTAL=$(echo "$RESULT" | jq -r '.grandTotal // empty' 2>/dev/null || echo "0")
        echo "total-cost=$TOTAL" >> $GITHUB_OUTPUT

    - name: Run Base Branch Cost Estimation
      id: base-cost-estimator
      if: inputs.base-file != ''
      shell: bash
      run: |
        ARGS="estimate --file ${{ inputs.base-file }}"
        if [ -n "${{ inputs.base-params-file }}" ]; then
          ARGS="$ARGS --params-file ${{ inputs.base-params-file }}"
        fi
        ARGS="$ARGS --output json --currency ${{ inputs.currency }}"

        BASE_RESULT=$("${{ runner.temp }}/washington/cli" $ARGS 2>/dev/null || echo '{"grandTotal": 0}')

        BASE_TOTAL=$(echo "$BASE_RESULT" | jq -r '.grandTotal // empty' 2>/dev/null || echo "0")
        echo "base-cost=$BASE_TOTAL" >> $GITHUB_OUTPUT

    - name: Calculate Delta
      id: delta
      shell: bash
      run: |
        TOTAL="${{ steps.cost-estimator.outputs.total-cost }}"
        BASE="${{ steps.base-cost-estimator.outputs.base-cost || '0' }}"
        DELTA=$(echo "${TOTAL:-0} - ${BASE:-0}" | bc -l 2>/dev/null || echo "0")
        echo "delta-cost=$DELTA" >> $GITHUB_OUTPUT

    - name: Check Threshold
      if: inputs.fail-on-threshold != ''
      shell: bash
      run: |
        TOTAL="${{ steps.cost-estimator.outputs.total-cost }}"
        THRESHOLD="${{ inputs.fail-on-threshold }}"
        if [ "$(echo "${TOTAL:-0} > ${THRESHOLD}" | bc -l 2>/dev/null)" = "1" ]; then
          echo "::error::Estimated monthly cost ($${TOTAL}) exceeds threshold ($${THRESHOLD})"
          exit 1
        fi
